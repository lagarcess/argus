openapi: 3.1.0
info:
  title: Argus Alpha API
  version: 1.0.0-alpha
  description: Contract-first Alpha API for chat-first investing idea validation.
servers:
  - url: /api/v1
paths:
  /api/v1/auth/signup:
    post:
      responses:
        "200":
          description: Account created or mocked in development.
  /api/v1/auth/login:
    post:
      responses:
        "200":
          description: Session created.
  /api/v1/auth/logout:
    post:
      responses:
        "200":
          description: Session cleared.
  /api/v1/auth/session:
    get:
      responses:
        "200":
          description: Current authentication state and user.
  /api/v1/me:
    get:
      responses:
        "200":
          description: Current user profile and preferences.
    patch:
      responses:
        "200":
          description: Updated user profile and preferences.
  /api/v1/conversations:
    get:
      responses:
        "200":
          description: Cursor-paginated conversations.
    post:
      responses:
        "200":
          description: Created conversation.
    delete:
      responses:
        "200":
          description: Soft-deleted all non-deleted conversations for the user.
  /api/v1/conversations/{id}:
    patch:
      responses:
        "200":
          description: Updated conversation title, pin, or archive state.
    delete:
      responses:
        "200":
          description: Soft-deleted conversation.
  /api/v1/conversations/{id}/messages:
    get:
      responses:
        "200":
          description: Cursor-paginated messages.
  /api/v1/chat/stream:
    post:
      responses:
        "200":
          description: >
            Server-sent token, status, title, result, and done events. Final
            payloads and persisted assistant metadata may include typed
            `recovery` and `clarification` objects so clients render localized
            degraded-fallback UI from static i18n keys instead of assistant
            prose.
          content:
            text/event-stream:
              schema:
                type: string
        "409":
          description: >
            The selected response option is missing, mismatched, foreign to the
            owner or conversation, or no longer attached to the latest active
            assistant message.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/strategies:
    get:
      responses:
        "200":
          description: Cursor-paginated strategies with strategy_surface_metrics.
    post:
      responses:
        "200":
          description: Created executable strategy.
  /api/v1/strategies/{id}:
    patch:
      responses:
        "200":
          description: Updated strategy metadata or metric preferences.
    delete:
      responses:
        "200":
          description: Soft-deleted strategy.
  /api/v1/collections:
    get:
      responses:
        "200":
          description: Cursor-paginated collections.
    post:
      responses:
        "200":
          description: Created organizational collection.
  /api/v1/collections/{id}:
    patch:
      responses:
        "200":
          description: Updated collection name or pin state.
    delete:
      responses:
        "200":
          description: Soft-deleted collection.
  /api/v1/collections/{id}/strategies:
    post:
      responses:
        "200":
          description: Attached strategies to a collection.
  /api/v1/collections/{id}/strategies/{strategy_id}:
    delete:
      responses:
        "200":
          description: Detached strategy from collection.
  /api/v1/backtests/run:
    post:
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Stable client key for deduplicating direct backtest runs.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRunRequest"
      responses:
        "200":
          description: Completed Alpha backtest run.
          content:
            application/json:
              schema:
                type: object
                required: [run]
                properties:
                  run:
                    $ref: "#/components/schemas/BacktestRun"
        "400":
          description: Missing required Idempotency-Key header.
        "422":
          description: Problem Details for unsupported Alpha requests or unusable common data coverage. Coverage rejection occurs before quota admission.
        "409":
          description: The data window changed after approval and must be reviewed again.
        "503":
          description: Market data is temporarily unavailable.
  /api/v1/backtest-jobs/{id}:
    get:
      responses:
        "200":
          description: Durable async backtest job state, with linked run when available.
        "404":
          description: Job not found or inaccessible.
  /api/v1/backtests/{id}:
    get:
      responses:
        "200":
          description: Backtest run detail including chart and trades.
  /api/v1/history:
    get:
      responses:
        "200":
          description: Mixed recent activity feed.
  /api/v1/search:
    get:
      responses:
        "200":
          description: Global keyword search across chats, strategies, collections, runs, and typed P1 recall objects.
  /api/v1/evidence-artifacts/{id}/decision:
    post:
      description: Create or update the one current decision for a user-owned evidence artifact.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionNoteCreate"
      responses:
        "200":
          description: Canonical current decision note and updated evidence/idea lifecycle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionNoteResponse"
        "404":
          description: Evidence artifact not found or inaccessible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Malformed decision payload or unsupported decision state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                type: https://api.argus.app/problems/validation-error
                title: Validation Error
                status: 422
                detail: Request validation failed.
                code: validation_error
                request_id: req_123
                context:
                  errors: []
        "500":
          description: Decision capture failed after request validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                type: https://api.argus.app/problems/decision-capture-failed
                title: Decision Capture Failed
                status: 500
                detail: Argus could not safely record that decision. Please retry in a moment.
                code: decision_capture_failed
                request_id: req_123
  /api/v1/feedback:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - message
              properties:
                type:
                  type: string
                  enum:
                    - bug
                    - feature
                    - general
                    - account_deletion_request
                message:
                  type: string
                  minLength: 1
                context:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Feedback accepted.
components:
  schemas:
    ChatClarification:
      type: object
      description: Typed degraded clarification, coverage-recovery, or unsupported-recovery sidecar for chat final payloads and assistant metadata.
      required:
        - kind
        - reason_code
        - semantic_needs
        - payload
        - options
      properties:
        kind:
          type: string
          enum: [clarification, coverage_recovery, unsupported_recovery]
        reason_code:
          type: string
          examples: [missing_period, no_common_data_window, unsupported_strategy_logic]
        requested_field:
          type:
            - string
            - "null"
        requested_fields:
          type: array
          items:
            type: string
        semantic_needs:
          type: array
          items:
            type: string
        payload:
          type: object
          additionalProperties: true
          description: Typed strategy context and optional raw unsupported value.
        options:
          type: array
          items:
            $ref: "#/components/schemas/ChatClarificationOption"
    ChatClarificationOption:
      type: object
      description: Button/action option identified by typed payload, not display text.
      required:
        - id
        - replacement_values
      properties:
        id:
          type: string
          examples: [rsi_threshold, buy_and_hold, moving_average_crossover]
        replacement_values:
          type: object
          additionalProperties: true
    DateRange:
      type: object
      required: [start, end]
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
    MarketDataCoverage:
      type: object
      required:
        - schema_version
        - outcome
        - requested_date_range
        - effective_date_range
        - dataset_id
      properties:
        schema_version:
          const: market_data_coverage_v1
        outcome:
          enum: [full_coverage, adjusted_coverage]
        requested_date_range:
          $ref: "#/components/schemas/DateRange"
        effective_date_range:
          $ref: "#/components/schemas/DateRange"
        dataset_id:
          type: string
          description: Stable identity of the prepared bars shared by metrics, benchmark alignment, chart construction, and finalization.
        observations_by_symbol:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
    ConfirmationPeriodAdjustment:
      type: object
      required: [code, requested_date_range, effective_date_range]
      properties:
        code:
          const: effective_window_adjusted
        requested_date_range:
          $ref: "#/components/schemas/DateRange"
        effective_date_range:
          $ref: "#/components/schemas/DateRange"
    BacktestRunRequest:
      type: object
      properties:
        strategy_id:
          type: string
        conversation_id:
          type: string
        template:
          type: string
        asset_class:
          enum: [equity, crypto, currency_pair]
        symbols:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: string
        timeframe:
          enum: [1h, 2h, 4h, 6h, 12h, 1D]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        side:
          type: string
        starting_capital:
          type: number
        allocation_method:
          const: equal_weight
        parameters:
          type: object
          additionalProperties: true
        benchmark_symbol:
          type: string
    BacktestRun:
      type: object
      required:
        - id
        - status
        - asset_class
        - symbols
        - benchmark_symbol
        - metrics
        - config_snapshot
        - conversation_result_card
      properties:
        id:
          type: string
          format: uuid
        status:
          enum: [queued, running, completed, failed]
        asset_class:
          enum: [equity, crypto]
        symbols:
          type: array
          maxItems: 5
          items:
            type: string
        allocation_method:
          const: equal_weight
        benchmark_symbol:
          type: string
          description: Equity defaults to SPY; crypto defaults to BTC.
        metrics:
          type: object
          description: Canonical aggregate and by-symbol backtest metrics.
        config_snapshot:
          type: object
          description: Reproducible normalized runtime configuration. New runs include requested_date_range, effective_date_range, and data_coverage; execution and display use the effective range while the requested range remains provenance.
        conversation_result_card:
          type: object
          description: Beginner-friendly inline chat result card. Completed chat runs may include P1 sidecar ids, decision state, and optional structured execution_costs evidence when the engine modeled fees/slippage.
    ArtifactLifecycle:
      type: string
      enum: [captured, reviewed, saved, decided, archived, discarded]
    DecisionState:
      type: string
      enum: [watching, promising, rejected, revisit_later]
    EvidenceArtifact:
      type: object
      required:
        - id
        - idea_id
        - idea_version_id
        - artifact_type
        - lifecycle
        - title
        - digest
        - payload
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        idea_id:
          type: string
          format: uuid
        idea_version_id:
          type: string
          format: uuid
        source_conversation_id:
          type:
            - string
            - "null"
          format: uuid
        source_run_id:
          type:
            - string
            - "null"
          format: uuid
        artifact_type:
          const: backtest
        lifecycle:
          $ref: "#/components/schemas/ArtifactLifecycle"
        title:
          type: string
        digest:
          type: string
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DecisionNote:
      type: object
      required:
        - id
        - idea_id
        - idea_version_id
        - evidence_artifact_id
        - decision_state
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        idea_id:
          type: string
          format: uuid
        idea_version_id:
          type: string
          format: uuid
        evidence_artifact_id:
          type: string
          format: uuid
        source_conversation_id:
          type:
            - string
            - "null"
          format: uuid
        decision_state:
          $ref: "#/components/schemas/DecisionState"
        note:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DecisionNoteCreate:
      type: object
      required:
        - decision_state
      properties:
        decision_state:
          $ref: "#/components/schemas/DecisionState"
        note:
          type:
            - string
            - "null"
          maxLength: 2000
    DecisionNoteResponse:
      type: object
      required:
        - decision
        - evidence_artifact
      properties:
        decision:
          $ref: "#/components/schemas/DecisionNote"
        evidence_artifact:
          $ref: "#/components/schemas/EvidenceArtifact"
    BacktestJob:
      type: object
      required:
        - id
        - conversation_id
        - status
        - retryable
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        request_message_id:
          type:
            - string
            - "null"
          format: uuid
        confirmation_message_id:
          type:
            - string
            - "null"
          format: uuid
        status:
          enum: [queued, running, succeeded, failed, canceled, expired]
        result_run_id:
          type:
            - string
            - "null"
          format: uuid
        failure_code:
          type:
            - string
            - "null"
        failure_detail:
          type:
            - string
            - "null"
        retryable:
          type: boolean
        queued_at:
          type:
            - string
            - "null"
          format: date-time
        started_at:
          type:
            - string
            - "null"
          format: date-time
        finished_at:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type:
            - string
            - "null"
          format: date-time
        updated_at:
          type:
            - string
            - "null"
          format: date-time
    BacktestJobResponse:
      type: object
      required:
        - job
        - run
      properties:
        job:
          $ref: "#/components/schemas/BacktestJob"
        run:
          oneOf:
            - $ref: "#/components/schemas/BacktestRun"
            - type: "null"
        result_readout:
          description: Backend-generated Quick take markdown for completed workflow jobs.
          type:
            - string
            - "null"
        result_readout_source:
          description: Provenance for the backend-generated Quick take markdown.
          type:
            - string
            - "null"
        result_readout_fallback_used:
          description: Whether the deterministic fallback renderer produced the readout.
          type:
            - boolean
            - "null"
        result_readout_failure_mode:
          description: Optional reason the normal result readout path could not complete.
          type:
            - string
            - "null"
    Collection:
      type: object
      description: Lightweight organizational grouping of strategies.
    Strategy:
      type: object
      description: Saved executable idea backed by a supported Alpha template.
    Error:
      type: object
      description: RFC 9457 Problem Details with code and request_id.
tags:
  - name: backtest_runs
    description: Immutable Alpha simulation results.
