services:
  - type: web
    name: argus-api
    runtime: python
    repo: https://github.com/lagarcess/argus
    branch: main
    rootDir: .
    region: virginia
    plan: free
    autoDeployTrigger: off
    buildCommand: pip install poetry && poetry config virtualenvs.create false && poetry install --only main --no-interaction
    startCommand: poetry run uvicorn argus.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ARGUS_PERSISTENCE_MODE
        value: supabase
      - key: ARGUS_DEV_MEMORY_FALLBACK
        value: "false"
      - key: ARGUS_MARKET_DATA_PROVIDER_MODE
        value: live_provider
      - key: ARGUS_CHECKPOINTER_MODE
        value: postgres
      - key: ARGUS_MOCK_AUTH
        value: "false"
      - key: ARGUS_CORS_ALLOW_ORIGINS
        value: https://argus-app-suz5.onrender.com
      - key: ARGUS_STRATEGIES_ENABLED
        value: "false"
      - key: ARGUS_CONTEXT_PACKETS_ENABLED
        value: "true"
      - key: ARGUS_CONTEXT_PACKET_BUDGET_SECONDS
        value: "4"
      - key: ARGUS_TITLE_AUTOGEN_ENABLED
        value: "true"
      - key: ARGUS_TITLE_AUTOGEN_TIMEOUT_MS
        value: "250"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ARGUS_UTILITY_MODEL
        sync: false
      - key: ARGUS_UTILITY_FALLBACK_MODEL
        sync: false
      - key: ARGUS_CHAT_MODEL
        sync: false
      - key: ARGUS_CHAT_FALLBACK_MODEL
        sync: false
      - key: ARGUS_STRUCTURED_MODEL
        sync: false
      - key: ARGUS_STRUCTURED_FALLBACK_MODEL
        sync: false
      - key: ARGUS_CONTEXT_MODEL
        sync: false
      - key: ARGUS_CONTEXT_FALLBACK_MODEL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER_TRADING
        value: "true"

  - type: web
    name: argus-app
    runtime: node
    repo: https://github.com/lagarcess/argus
    branch: main
    rootDir: web
    region: virginia
    plan: free
    autoDeployTrigger: off
    buildCommand: npm install -g bun && bun install --frozen-lockfile && bun run build
    startCommand: bun run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_APP_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_MOCK_AUTH
        value: "false"
      - key: NEXT_PUBLIC_ARGUS_API_URL
        value: https://argus-ohr5.onrender.com/api/v1
      - key: NEXT_PUBLIC_STRATEGIES_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_COLLECTIONS_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_OMNISEARCH_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_PRIVATE_ALPHA_ONBOARDING_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_CHAT_EXPLORATORY_SUGGESTIONS_ENABLED
        value: "false"
