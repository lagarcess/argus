  - type: web
    name: argus-app
    runtime: node
    repo: https://github.com/lagarcess/argus
    branch: main
    rootDir: web
    region: virginia
    plan: free
    autoDeployTrigger: off
    buildCommand: npm install -g bun && bun install --frozen-lockfile && bun run build
    startCommand: bun run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_APP_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://lgdhvepyrzbnscqssgqq.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZGh2ZXB5cnpibnNjcXNzZ3FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzkwOTksImV4cCI6MjA4ODI1NTA5OX0.mc7KjmJYuAp01Mj96gceGsAW2UPI2_HQsv0_kyWaQmo
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_MOCK_AUTH
        value: "false"
      - key: NEXT_PUBLIC_ARGUS_API_URL
        value: https://argus-ohr5.onrender.com/api/v1
      - key: NEXT_PUBLIC_STRATEGIES_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_COLLECTIONS_ENABLED
