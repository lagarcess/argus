services:
  - type: web
    name: argus-api
    runtime: python
    repo: https://github.com/lagarcess/argus
    branch: main
    rootDir: .
    region: virginia
    plan: free
    autoDeployTrigger: off
    buildCommand: pip install poetry && poetry config virtualenvs.create false && poetry install --only main --no-interaction
    startCommand: poetry run uvicorn argus.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ARGUS_PERSISTENCE_MODE
        value: supabase
      - key: ARGUS_DEV_MEMORY_FALLBACK
        value: "false"
      - key: ARGUS_MARKET_DATA_PROVIDER_MODE
        value: live_provider
      - key: MARKET_DATA_CACHE_TTL
        value: "43200"
      - key: ARGUS_RUNTIME_EVENT_TIMEOUT_SECONDS
        value: "180"
      - key: ARGUS_RUNTIME_EVENT_KEEPALIVE_SECONDS
        value: "15"
      - key: ARGUS_CHECKPOINTER_MODE
        value: postgres
      - key: ARGUS_MOCK_AUTH
        value: "false"
      - key: ARGUS_CORS_ALLOW_ORIGINS
        value: https://argus-app-suz5.onrender.com
      - key: ARGUS_STRATEGIES_ENABLED
        value: "false"
      - key: ARGUS_BACKTEST_JOBS_SHADOW_ENABLED
        value: "false"
      - key: ARGUS_CONTEXT_PACKETS_ENABLED
        value: "true"
      - key: ARGUS_CONTEXT_PACKET_BUDGET_SECONDS
        value: "4"
      - key: ARGUS_TITLE_AUTOGEN_ENABLED
        value: "true"
      - key: ARGUS_TITLE_AUTOGEN_TIMEOUT_MS
        value: "250"
      - key: ARGUS_READINESS_ASSET_TIMEOUT_SECONDS
        value: "25"
      - key: ARGUS_OPS_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        value: https://lgdhvepyrzbnscqssgqq.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZGh2ZXB5cnpibnNjcXNzZ3FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzkwOTksImV4cCI6MjA4ODI1NTA5OX0.mc7KjmJYuAp01Mj96gceGsAW2UPI2_HQsv0_kyWaQmo
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ARGUS_UTILITY_MODEL
        value: qwen/qwen3.5-9b
      - key: ARGUS_UTILITY_FALLBACK_MODEL
        value: google/gemini-2.5-flash-lite
      - key: ARGUS_CHAT_MODEL
