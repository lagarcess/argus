name: Private Alpha Canary

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

permissions:
  contents: read

concurrency:
  group: private-alpha-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ARGUS_WARMUP_EXPECT_MODE: real-workflow
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
      ARGUS_CANARY_EMAIL: ${{ secrets.ARGUS_CANARY_EMAIL }}
      ARGUS_CANARY_PASSWORD: ${{ secrets.ARGUS_CANARY_PASSWORD }}
      ARGUS_CANARY_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
      ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
      ARGUS_STALE_JOBS_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
      ARGUS_STALE_JOBS_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          missing=()
          for name in \
            RENDER_API_KEY \
            ARGUS_OPS_TOKEN \
            ARGUS_CANARY_EMAIL \
            ARGUS_CANARY_PASSWORD \
            ARGUS_CANARY_SUPABASE_URL \
            ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required private-alpha canary secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Warm Render product path
        run: .github/warmup-render.sh --expect-mode real-workflow

      - name: Run authenticated golden-path canary
        run: .github/canary-render.sh
