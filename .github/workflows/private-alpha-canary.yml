name: Private Alpha Canary

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

permissions:
  contents: read

concurrency:
  group: private-alpha-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      ARGUS_WARMUP_EXPECT_MODE: real-workflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Scheduled workflows start from the repository default branch. The
          # private-alpha canary must instead validate the integration candidate.
          ref: ${{ github.event_name == 'schedule' && 'codex/private-alpha-next' || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Render CLI
        run: |
          tmpdir="$(mktemp -d)"
          curl -fsSL https://github.com/render-oss/cli/releases/download/v2.20.0/cli_2.20.0_linux_amd64.zip -o "$tmpdir/render.zip"
          unzip -q "$tmpdir/render.zip" -d "$tmpdir"
          sudo mv "$tmpdir/cli_v2.20.0" /usr/local/bin/render
          render --version

      - name: Install Poetry
        run: python -m pip install poetry==2.1.3

      - name: Install backend dependencies
        run: poetry install --with dev,workflows --no-interaction

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Install Chromium for the deployed browser canary
        run: cd web && bunx playwright install --with-deps chromium

      - name: Run Spanish static UI canary assertions
        run: cd web && bun test __tests__/spanish-ui-smoke.test.ts

      - name: Run local predeploy smoke
        run: .github/local-smoke.sh --expected-sha "$(git rev-parse HEAD)"

      - name: Check required secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
          ARGUS_WORKFLOW_DATABASE_URL: ${{ secrets.ARGUS_WORKFLOW_DATABASE_URL }}
          ARGUS_CANARY_EMAIL: ${{ secrets.ARGUS_CANARY_EMAIL }}
          ARGUS_CANARY_PASSWORD: ${{ secrets.ARGUS_CANARY_PASSWORD }}
          ARGUS_CANARY_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
          ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=()
          for name in \
            RENDER_API_KEY \
            ARGUS_OPS_TOKEN \
            ARGUS_WORKFLOW_DATABASE_URL \
            ARGUS_CANARY_EMAIL \
            ARGUS_CANARY_PASSWORD \
            ARGUS_CANARY_SUPABASE_URL \
            ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required private-alpha canary secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Warm Render product path
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
          ARGUS_WORKFLOW_DATABASE_URL: ${{ secrets.ARGUS_WORKFLOW_DATABASE_URL }}
        run: .github/warmup-render.sh --expect-mode real-workflow

      - name: Prepare canary evidence directory
        run: mkdir -p temp/canary-evidence

      - name: Run authoritative Spanish release canary
        continue-on-error: true
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
          ARGUS_WORKFLOW_DATABASE_URL: ${{ secrets.ARGUS_WORKFLOW_DATABASE_URL }}
          ARGUS_CANARY_EMAIL: ${{ secrets.ARGUS_CANARY_EMAIL }}
          ARGUS_CANARY_PASSWORD: ${{ secrets.ARGUS_CANARY_PASSWORD }}
          ARGUS_CANARY_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
          ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          ARGUS_CANARY_SHA="$(git rev-parse HEAD)" \
          ARGUS_CANARY_EVIDENCE_PATH=temp/canary-evidence/es-419.json \
          ARGUS_CANARY_CAPTURE_PATH=temp/canary-evidence/es-419-capture.json \
          .github/canary-render.sh
          status=$?
          echo "$status" > temp/canary-evidence/es-419.exit
          exit "$status"

      - name: Require authoritative private-alpha canary
        if: always()
        run: |
          failed=0
          status_file="temp/canary-evidence/es-419.exit"
          if [ ! -f "$status_file" ]; then
            echo "canary_locale_es-419_exit=missing"
            exit 1
          fi
          status="$(cat "$status_file")"
          echo "canary_locale_es-419_exit=$status"
          if [ "$status" != "0" ]; then failed=1; fi
          exit "$failed"

      - name: Upload canary evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-alpha-canary-evidence
          path: temp/canary-evidence/*
          if-no-files-found: warn
          retention-days: 30
