name: Private Alpha Canary

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

permissions:
  contents: read

concurrency:
  group: private-alpha-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ARGUS_WARMUP_EXPECT_MODE: real-workflow
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
      ARGUS_CANARY_EMAIL: ${{ secrets.ARGUS_CANARY_EMAIL }}
      ARGUS_CANARY_PASSWORD: ${{ secrets.ARGUS_CANARY_PASSWORD }}
      ARGUS_CANARY_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
      ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
      ARGUS_STALE_JOBS_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
      ARGUS_STALE_JOBS_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Poetry
        run: python -m pip install poetry==2.1.3

      - name: Install backend dependencies
        run: poetry install --with dev,workflows --no-interaction

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run local predeploy smoke
        run: .github/local-smoke.sh --expected-sha "$GITHUB_SHA"

      - name: Check required secrets
        run: |
          missing=()
          for name in \
            RENDER_API_KEY \
            ARGUS_OPS_TOKEN \
            ARGUS_CANARY_EMAIL \
            ARGUS_CANARY_PASSWORD \
            ARGUS_CANARY_SUPABASE_URL \
            ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required private-alpha canary secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Warm Render product path
        run: .github/warmup-render.sh --expect-mode real-workflow

      - name: Run authenticated golden-path canary
        run: .github/canary-render.sh
