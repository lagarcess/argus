name: Private Alpha Canary

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

permissions:
  contents: read

concurrency:
  group: private-alpha-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ARGUS_WARMUP_EXPECT_MODE: real-workflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Render CLI
        run: |
          curl -fsSL https://github.com/render-oss/cli/releases/download/v2.20.0/cli_2.20.0_linux_amd64.zip -o render.zip
          unzip -q render.zip
          sudo mv cli_v2.20.0 /usr/local/bin/render
          render --version

      - name: Install Poetry
        run: python -m pip install poetry==2.1.3

      - name: Install backend dependencies
        run: poetry install --with dev,workflows --no-interaction

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run local predeploy smoke
        run: .github/local-smoke.sh --expected-sha "$GITHUB_SHA"

      - name: Check required secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
          ARGUS_WORKFLOW_DATABASE_URL: ${{ secrets.ARGUS_WORKFLOW_DATABASE_URL }}
          ARGUS_CANARY_EMAIL: ${{ secrets.ARGUS_CANARY_EMAIL }}
          ARGUS_CANARY_PASSWORD: ${{ secrets.ARGUS_CANARY_PASSWORD }}
          ARGUS_CANARY_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
          ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=()
          for name in \
            RENDER_API_KEY \
            ARGUS_OPS_TOKEN \
            ARGUS_WORKFLOW_DATABASE_URL \
            ARGUS_CANARY_EMAIL \
            ARGUS_CANARY_PASSWORD \
            ARGUS_CANARY_SUPABASE_URL \
            ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required private-alpha canary secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Warm Render product path
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
          ARGUS_WORKFLOW_DATABASE_URL: ${{ secrets.ARGUS_WORKFLOW_DATABASE_URL }}
        run: .github/warmup-render.sh --expect-mode real-workflow

      - name: Prepare canary evidence directory
        run: mkdir -p temp/canary-evidence

      - name: Run authenticated English golden-path canary
        continue-on-error: true
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
          ARGUS_WORKFLOW_DATABASE_URL: ${{ secrets.ARGUS_WORKFLOW_DATABASE_URL }}
          ARGUS_CANARY_EMAIL: ${{ secrets.ARGUS_CANARY_EMAIL }}
          ARGUS_CANARY_PASSWORD: ${{ secrets.ARGUS_CANARY_PASSWORD }}
          ARGUS_CANARY_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
          ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          ARGUS_CANARY_LANGUAGE=en \
          ARGUS_CANARY_EVIDENCE_PATH=temp/canary-evidence/en.json \
          .github/canary-render.sh
          status=$?
          echo "$status" > temp/canary-evidence/en.exit
          exit "$status"

      - name: Run authenticated Spanish golden-path canary
        continue-on-error: true
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
          ARGUS_WORKFLOW_DATABASE_URL: ${{ secrets.ARGUS_WORKFLOW_DATABASE_URL }}
          ARGUS_CANARY_EMAIL: ${{ secrets.ARGUS_CANARY_EMAIL }}
          ARGUS_CANARY_PASSWORD: ${{ secrets.ARGUS_CANARY_PASSWORD }}
          ARGUS_CANARY_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
          ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          ARGUS_CANARY_LANGUAGE=es-419 \
          ARGUS_CANARY_PROMPT='Prueba una estrategia de comprar y mantener AAPL y MSFT con pesos iguales desde el 1 de enero de 2025 hasta el 5 de junio de 2026 con 10000 dolares' \
          ARGUS_CANARY_EVIDENCE_PATH=temp/canary-evidence/es-419.json \
          .github/canary-render.sh
          status=$?
          echo "$status" > temp/canary-evidence/es-419.exit
          exit "$status"

      - name: Run provider-path-sensitive Spanish canary
        continue-on-error: true
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ARGUS_OPS_TOKEN: ${{ secrets.ARGUS_OPS_TOKEN }}
          ARGUS_WORKFLOW_DATABASE_URL: ${{ secrets.ARGUS_WORKFLOW_DATABASE_URL }}
          ARGUS_CANARY_EMAIL: ${{ secrets.ARGUS_CANARY_EMAIL }}
          ARGUS_CANARY_PASSWORD: ${{ secrets.ARGUS_CANARY_PASSWORD }}
          ARGUS_CANARY_SUPABASE_URL: ${{ secrets.ARGUS_CANARY_SUPABASE_URL }}
          ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ARGUS_CANARY_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          ARGUS_CANARY_LANGUAGE=es-419 \
          ARGUS_CANARY_PROMPT='Prueba comprar y mantener SNDK, AMD, NVDA y GS con 1000 dólares desde el 24 de febrero de 2025 hasta el 5 de junio de 2026' \
          ARGUS_CANARY_FOCUSED_SYMBOL_PATH=SNDK,AMD,NVDA,GS \
          ARGUS_CANARY_REQUIRE_ASYNC_WORKFLOW=true \
          ARGUS_CANARY_EVIDENCE_PATH=temp/canary-evidence/provider-path.json \
          .github/canary-render.sh
          status=$?
          echo "$status" > temp/canary-evidence/provider-path.exit
          exit "$status"

      - name: Require private-alpha canary matrix
        if: always()
        run: |
          failed=0
          for locale in en es-419 provider-path
          do
            status_file="temp/canary-evidence/${locale}.exit"
            if [ ! -f "$status_file" ]; then
              echo "canary_locale_${locale}_exit=missing"
              failed=1
              continue
            fi
            status="$(cat "$status_file")"
            echo "canary_locale_${locale}_exit=$status"
            if [ "$status" != "0" ]; then
              failed=1
            fi
          done
          exit "$failed"

      - name: Upload canary evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-alpha-canary-evidence
          path: temp/canary-evidence/*
          if-no-files-found: warn
          retention-days: 30
