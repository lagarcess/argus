name: Private Alpha Local Smoke

"on":
  workflow_dispatch:
  push:
    branches: ["codex/private-alpha-next"]
  pull_request:
    branches: ["codex/private-alpha-next", "codex/private-alpha-next-jules-intake"]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: private-alpha-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Poetry
        run: python -m pip install poetry==2.1.3

      - name: Install backend dependencies
        run: poetry install --with dev,workflows --no-interaction

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run local predeploy smoke
        run: .github/local-smoke.sh --expected-sha "$GITHUB_SHA"
