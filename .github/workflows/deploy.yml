name: CI

"on":
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ownership-gate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run branch ownership gate
        run: python .agent/scripts/ownership/verify_branch_ownership.py

  backend-checks:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: python -m pip install poetry==2.1.3

      - name: Install backend dependencies
        run: poetry install --with dev,workflows --no-interaction

      - name: Lint backend, tests, scripts, and workflows
        run: poetry run ruff check src tests workflows scripts

      - name: Run focused backend regression suite
        run: |
          poetry run pytest \
            tests/test_environment_scripts.py \
            tests/test_api_import_boundary.py \
            tests/test_render_canary_script.py \
            tests/test_render_runtime_compatibility.py \
            tests/test_private_launch_hardening.py \
            tests/test_checkpoint_rls_migration.py \
            tests/test_ci_workflow.py \
            -q --no-cov

  frontend-checks:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run frontend tests
        run: cd web && bun test

      - name: Build frontend
        run: cd web && bun run build

  ci:
    name: ci
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    needs:
      - ownership-gate
      - backend-checks
      - frontend-checks
    steps:
      - name: All checks passed
        run: echo "CI checks passed."
