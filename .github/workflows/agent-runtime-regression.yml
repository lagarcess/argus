name: Agent Runtime Regression

"on":
  workflow_dispatch:
  schedule:
    # Nightly UTC guardrail so curated CI file lists do not hide runtime drift.
    - cron: "15 9 * * *"
  push:
    branches: ["codex/private-alpha-next"]
    paths:
      - "src/argus/agent_runtime/**"
      - "tests/agent_runtime/**"
      - "tests/test_spine_guardrails.py"
      - ".github/workflows/agent-runtime-regression.yml"
  pull_request:
    branches: ["codex/private-alpha-next"]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/argus/agent_runtime/**"
      - "tests/agent_runtime/**"
      - "tests/test_spine_guardrails.py"
      - ".github/workflows/agent-runtime-regression.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  agent-runtime:
    name: agent_runtime pytest sweep
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: python -m pip install poetry==2.1.3

      - name: Install backend dependencies
        run: poetry install --with dev --no-interaction

      - name: Run agent_runtime regression sweep
        run: poetry run pytest tests/agent_runtime tests/test_spine_guardrails.py -q --no-cov
