category: graceful_recovery
cases:
  - id: graceful_recovery_weekly_options_aapl
    prompt: "please backtest weekly options on apple from 2024-01-01 through 2024-12-31"
    user_language: en
    ui_language: en
    expected:
      intent: unsupported_or_out_of_scope
      capability_verdict: unsupported
      assets: ["AAPL"]
      asset_class: equity
      strategy_type: null
      date_range:
        start: "2024-01-01"
        end: "2024-12-31"
      benchmark_symbol: SPY
      stage_outcomes: ["needs_clarification", "await_user_reply"]
    prose_judge:
      criteria: ["recovery_tone", "honesty", "no_raw_runtime_error"]

  - id: graceful_recovery_spanish_weekly_options_aapl
    prompt: "por favor intenta probar opciones semanales de AAPL desde 2024-01-01 hasta 2024-12-31"
    user_language: es-419
    ui_language: es-419
    expected:
      intent: unsupported_or_out_of_scope
      capability_verdict: unsupported
      assets: ["AAPL"]
      asset_class: equity
      strategy_type: null
      date_range:
        start: "2024-01-01"
        end: "2024-12-31"
      benchmark_symbol: SPY
      stage_outcomes: ["needs_clarification", "await_user_reply"]
    prose_judge:
      criteria: ["recovery_tone", "honesty", "spanish_language_integrity", "no_raw_runtime_error"]

  - id: graceful_recovery_spanish_offline_clarifier_missing_period_aapl
    prompt: "Prueba comprar y mantener AAPL"
    user_language: es-419
    ui_language: es-419
    degraded_mode:
      clarifier: offline
    expected:
      intent: backtest_execution
      capability_verdict: needs_clarification
      assets: ["AAPL"]
      asset_class: equity
      strategy_type: buy_and_hold
      benchmark_symbol: SPY
      stage_outcomes: ["needs_clarification", "await_user_reply"]
      clarification:
        kind: clarification
        reason_code: missing_period
        requested_field: date_range
        semantic_needs: ["period"]
