openapi: 3.1.0
info:
  title: Argus Observatory API
  description: Narrow-MVP private beta API for onboarding, drafting, strategy CRUD,
    backtests, history, and logout.
  version: 1.1.0-narrow
servers:
- url: http://localhost:8000/api/v1
  description: Local Development (FastAPI)
- url: https://argus-app-suz5.onrender.com/api/v1
  description: Production & Staging (Render)
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sb-access-token
  schemas:
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        is_admin:
          type: boolean
        subscription_tier:
          type: string
          enum:
          - free
          - plus
          - pro
          - max
        backtest_quota:
          type: integer
        remaining_quota:
          type: integer
        ai_draft_quota:
          type: integer
        remaining_ai_draft_quota:
          type: integer
        feature_flags:
          type: object
          properties:
            advanced_charting:
              type: boolean
            options_enabled:
              type: boolean
            memos_sync:
              type: boolean
        theme:
          type: string
          enum:
          - light
          - dark
          - system
        onboarding_completed:
          type: boolean
        onboarding_step:
          type: string
        onboarding_intent:
          type: string
          nullable: true
      required:
      - id
      - is_admin
      - subscription_tier
      - backtest_quota
      - remaining_quota
      - feature_flags
      - theme
      - onboarding_completed
      - onboarding_step
    ErrorResponse:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        error_code:
          type: string
      required:
      - type
      - title
      - status
      - detail
      - error_code
    StrategySchema:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        symbols:
          type: array
          items:
            type: string
        timeframe:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        slippage:
          type: number
        fees:
          type: number
        indicators_config:
          type: object
          additionalProperties:
            oneOf:
            - type: number
            - type: boolean
            - type: string
        patterns:
          type: array
          items:
            type: string
        capital:
          type: number
        trade_direction:
          type: string
          enum:
          - LONG
          - SHORT
          - BOTH
        participation_rate:
          type: number
        execution_priority:
          type: number
        va_sensitivity:
          type: number
        slippage_model:
          type: string
          enum:
          - fixed
          - vol_adjusted
        entry_criteria:
          type: array
          items:
            type: object
        exit_criteria:
          type: array
          items:
            type: object
        stop_loss_pct:
          type: number
        take_profit_pct:
          type: number
        ai_explanation:
          type: string
      required:
      - name
      - symbols
      - timeframe
    BacktestRequest:
      type: object
      properties:
        strategy_id:
          type: string
          format: uuid
        symbols:
          type: array
          items:
            type: string
        timeframe:
          type: string
        slippage:
          type: number
        fees:
          type: number
        side:
          type: string
          enum:
          - long
          - short
          default: long
        participation_rate:
          type: number
          default: 0.1
        execution_priority:
          type: number
          default: 1.0
        va_sensitivity:
          type: number
          default: 1.0
        slippage_model:
          type: string
          enum:
          - fixed
          - vol_adjusted
          default: vol_adjusted
        entry_criteria:
          type: array
          items:
            type: object
        exit_criteria:
          type: array
          items:
            type: object
        stop_loss_pct:
          type: number
        take_profit_pct:
          type: number
    BacktestResults:
      type: object
      properties:
        total_return_pct:
          type: number
        win_rate:
          type: number
        sharpe_ratio:
          type: number
        sortino_ratio:
          type: number
        calmar_ratio:
          type: number
        profit_factor:
          type: number
        expectancy:
          type: number
        max_drawdown_pct:
          type: number
        equity_curve:
          type: array
          items:
            type: number
        ideal_equity_curve:
          type: array
          items:
            type: number
        benchmark_equity_curve:
          type: array
          items:
            type: number
        benchmark_symbol:
          type: string
        trades:
          type: array
          items:
            $ref: '#/components/schemas/TradeSnippet'
        reality_gap_metrics:
          $ref: '#/components/schemas/RealityGapMetrics'
        pattern_breakdown:
          type: object
          additionalProperties:
            type: integer
    BacktestResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        config_snapshot:
          type: object
        results:
          $ref: '#/components/schemas/BacktestResults'
      required:
      - id
      - config_snapshot
      - results
    RealityGapMetrics:
      type: object
      properties:
        slippage_impact_pct:
          type: number
        fee_impact_pct:
          type: number
        vol_hazard_pct:
          type: number
        fidelity_score:
          type: number
    TradeSnippet:
      type: object
      properties:
        entry_time:
          type: string
        entry_price:
          type: number
        exit_price:
          type: number
        pnl_pct:
          type: number
    SimulationLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        strategy_name:
          type: string
        symbols:
          type: array
          items:
            type: string
        timeframe:
          type: string
        status:
          type: string
          enum:
          - pending
          - completed
          - failed
          - processing
        total_return_pct:
          type: number
        sharpe_ratio:
          type: number
        max_drawdown_pct:
          type: number
        win_rate:
          type: number
        total_trades:
          type: integer
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    ShareResponse:
      type: object
      properties:
        vanity_url:
          type: string
        og_image:
          type: string
        og_title:
          type: string
      required:
      - vanity_url
      - og_image
    SSORequest:
      type: object
      properties:
        provider:
          type: string
          enum:
          - google
          - discord
        redirect_to:
          type: string
      required:
      - provider
      - redirect_to
    SSOResponse:
      type: object
      properties:
        auth_url:
          type: string
      required:
      - auth_url
    TelemetryEventPayload:
      type: object
      properties:
        event:
          type: string
          enum:
          - onboarding_complete
          - draft_success
          - draft_fail
          - draft_saved
          - backtest_success
          - backtest_fail
          - logout
        timestamp:
          type: string
          format: date-time
        properties:
          type: object
          additionalProperties: true
      required:
      - event
      - timestamp
    TelemetryAcceptedResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
paths:
  /auth/session:
    get:
      summary: Get current authenticated user session
      security:
      - cookieAuth: []
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /auth/profile:
    patch:
      summary: Update user profile settings
      security:
      - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                theme:
                  type: string
                  enum:
                  - light
                  - dark
                  - system
                onboarding_completed:
                  type: boolean
                onboarding_step:
                  type: string
                onboarding_intent:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /strategies:
    get:
      summary: List user strategies
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: cursor
        schema:
          type: string
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
      responses:
        '200':
          description: Paginated strategies
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategies:
                    type: array
                    items:
                      $ref: '#/components/schemas/StrategySchema'
                  next_cursor:
                    type: string
                    nullable: true
    post:
      summary: Save a new strategy
      security:
      - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategySchema'
      responses:
        '201':
          description: Strategy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategySchema'
  /strategies/{id}:
    get:
      summary: Get strategy by id
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Strategy response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategySchema'
    put:
      summary: Update a strategy
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategySchema'
      responses:
        '200':
          description: Structure updated
    delete:
      summary: Delete a strategy
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Strategy deleted
  /history:
    get:
      summary: Get user run history
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: cursor
        schema:
          type: string
      responses:
        '200':
          description: Paginated run history
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulations:
                    type: array
                    items:
                      $ref: '#/components/schemas/SimulationLogEntry'
                  total:
                    type: integer
                  next_cursor:
                    type: string
  /backtests:
    post:
      summary: Execute a backtest simulation
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestRequest'
      responses:
        '200':
          description: Backtest results returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestResponse'
        '402':
          description: Quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /backtests/{id}:
    get:
      summary: Get detailed backtest results
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Detailed backtest results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestResponse'
        '404':
          description: Backtest not found
  /agent/draft:
    post:
      summary: Draft a strategy using AI Natural Language input
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
      responses:
        '200':
          description: Returns an unexecuted draft StrategySchema plus AI explanation
          content:
            application/json:
              schema:
                type: object
                required:
                - draft
                - ai_explanation
                properties:
                  draft:
                    $ref: '#/components/schemas/StrategySchema'
                  ai_explanation:
                    type: string
  /auth/logout:
    post:
      summary: Revoke upstream session and clear local auth cookies
      security:
      - cookieAuth: []
      responses:
        '204':
          description: Logged out
  /assets:
    get:
      summary: Search available market assets
      parameters:
      - in: query
        name: search
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of matched tickers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /usage:
    get:
      summary: Get user usage and quota
      security:
      - cookieAuth: []
      responses:
        '200':
          description: Usage info
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  limit:
                    type: integer
                  tier:
                    type: string
  /health:
    get:
      summary: API health and uptime check
      responses:
        '200':
          description: OK
  /auth/sso:
    post:
      summary: Initiate an SSO login flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSORequest'
      responses:
        '200':
          description: SSO authorization URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOResponse'
  /telemetry/events:
    post:
      summary: Ingest frontend telemetry events
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryEventPayload'
      responses:
        '202':
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryAcceptedResponse'
